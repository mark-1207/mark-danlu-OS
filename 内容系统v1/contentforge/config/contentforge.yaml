# contentforge.config.yaml

providers:
  openai:
    type: openai
    defaultModel: mimo-v2-flash
  xiaomi:
    type: openai
    defaultModel: mimo-v2-pro
  kimi:
    type: kimi
    defaultModel: moonshot-v1-128k
  anthropic:
    type: anthropic
    defaultModel: claude-sonnet-4-20250514

defaultProvider: openai

scenarios:
  create:
    steps:
      topic-analysis:
        temperature: 0.7
        maxTokens: 8192
      topic-assignment:
        temperature: 0.6
        maxTokens: 4000
      outline-generation:
        temperature: 0.6
        maxTokens: 4000
      content-generation:
        temperature: 0.8
        maxTokens: 8000
      review-optimization:
        temperature: 0.4
        maxTokens: 8000
  recreate:
    steps:
      viral-deconstruction:
        temperature: 0.3
        maxTokens: 6000
      differentiation:
        temperature: 0.8
        maxTokens: 4000
      new-outline:
        temperature: 0.6
        maxTokens: 4000
      content-generation:
        temperature: 0.8
        maxTokens: 8000
      dual-review:
        temperature: 0.3
        maxTokens: 8000

concurrency:
  maxParallel: 3
  batchSize: 5

output:
  dir: ./output
  saveIntermediateArtifacts: true

search:
  enabled: true
  provider: tavily

# 成本控制：限制单次 recreate 运行的最高预估成本
costControl:
  # maxCostPerRun: 0.5    # 最高预估成本（美元），不设置则无上限
  # onExceedAction: skip-local-rewrite  # 超过上限时：skip-local-rewrite（跳过元素级优化）或 abort（中止运行）
