# contentforge.config.yaml

providers:
  kimi:
    type: kimi
    defaultModel: claude-sonnet-4-6
    baseUrl: https://yunwu.ai/v1  # 可选，默认使用 KIMI_BASE_URL 环境变量
  anthropic:
    type: anthropic
    defaultModel: claude-sonnet-4-20250514
  openai:
    type: openai
    defaultModel: gpt-4o

defaultProvider: kimi

scenarios:
  create:
    steps:
      topic-analysis:
        temperature: 0.7
        maxTokens: 8192
      topic-assignment:
        temperature: 0.6
        maxTokens: 4000
      outline-generation:
        temperature: 0.6
        maxTokens: 4000
      content-generation:
        temperature: 0.8
        maxTokens: 8000
      review-optimization:
        temperature: 0.4
        maxTokens: 8000
  recreate:
    steps:
      viral-deconstruction:
        temperature: 0.3
        maxTokens: 6000
      differentiation:
        temperature: 0.8
        maxTokens: 4000
      new-outline:
        temperature: 0.6
        maxTokens: 4000
      content-generation:
        temperature: 0.8
        maxTokens: 8000
      dual-review:
        temperature: 0.3
        maxTokens: 8000

concurrency:
  maxParallel: 3
  batchSize: 5

output:
  dir: ./output
  saveIntermediateArtifacts: true

search:
  enabled: true
  provider: tavily
